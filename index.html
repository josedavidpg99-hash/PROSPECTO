<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Extractor de Prospectos por Ciudad</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  background:#0f1117;
  color:white;
  font-family:Arial, sans-serif;
  padding:20px;
}
h1{margin-top:0}
.card{
  background:#141823;
  border:1px solid #263041;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}
input,select,button{
  padding:8px;
  margin:4px;
  border-radius:6px;
  border:1px solid #334155;
}
button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}
button.red{background:#991b1b}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  border:1px solid #333;
  padding:7px;
  white-space:nowrap;
}
th{
  background:#1f2937;
}
.pagado{background:#dcfce7;color:#166534;font-weight:bold}
.agendar{background:#fee2e2;color:#991b1b;font-weight:bold}
.otro{background:#e2e8f0;color:#334155;font-weight:bold}
</style>
</head>

<body>

<h1>Extractor de Prospectos por Ciudad</h1>

<div class="card">
  <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.csv">
  <button onclick="exportExcel()">Exportar Excel</button>
  <button class="red" onclick="clearAll()">Borrar todo</button>
  <br>
  <input id="search" placeholder="Buscar nombre, teléfono o ciudad..." oninput="render()" style="width:330px">
  <select id="cityFilter" onchange="render()">
    <option>Todos</option>
  </select>
  <select id="statusFilter" onchange="render()">
    <option>Todos</option>
    <option>Pagado</option>
    <option>Agendar</option>
    <option>Esp. Disp.</option>
    <option>Pendiente</option>
  </select>
  <p id="msg"></p>
</div>

<div class="card">
  <b>Total:</b> <span id="total">0</span> |
  <b>Pagados:</b> <span id="pagados">0</span> |
  <b>Agendar:</b> <span id="agendar">0</span> |
  <b>Con teléfono:</b> <span id="phones">0</span>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Ciudad</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Nombre Completo</th>
<th>Teléfono</th>
<th>Trámite</th>
<th>Status</th>
<th>Propietario</th>
<th>Fuente</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
let rows = JSON.parse(localStorage.getItem("prospectos_ciudad_v1") || "[]");

document.getElementById("fileInput").addEventListener("change", async function(e){
  const files = Array.from(e.target.files);
  document.getElementById("msg").innerText = "Procesando archivos...";

  for(const file of files){
    await processFile(file);
  }

  dedupe();
  save();
  updateFilters();
  render();

  document.getElementById("msg").innerText = "Listo. Registros encontrados: " + rows.length;
});

function clean(v){
  return String(v || "")
    .replace(/\s+/g," ")
    .replace(/\u00A0/g," ")
    .trim();
}

function normalizeHeader(v){
  return clean(v)
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function digits(v){
  return String(v || "").replace(/\D/g,"");
}

function normalizePhone(v){
  let d = digits(v);

  if(d.length === 10){
    return "(" + d.slice(0,3) + ") " + d.slice(3,6) + "-" + d.slice(6);
  }

  if(d.length === 11 && d.startsWith("1")){
    return "+1 (" + d.slice(1,4) + ") " + d.slice(4,7) + "-" + d.slice(7);
  }

  if(d.length > 11){
    return d;
  }

  return "";
}

function isValidPhone(v){
  return digits(v).length >= 10;
}

function findCol(headers, options){
  const normalized = headers.map(h => normalizeHeader(h));

  for(const option of options){
    const key = normalizeHeader(option);
    const index = normalized.findIndex(h => h === key || h.includes(key));
    if(index >= 0) return headers[index];
  }

  return null;
}

function getSheetCity(sheetName){
  const s = clean(sheetName).toLowerCase();

  const invalid = [
    "sheet","hoja","general","pagado","pagados","base","tabla",
    "clientes","prospectos","data","datos"
  ];

  if(invalid.some(x => s.includes(x))) return "";

  return clean(sheetName);
}

async function processFile(file){
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, {type:"array"});

  for(const sheetName of wb.SheetNames){
    const ws = wb.Sheets[sheetName];

    const data = XLSX.utils.sheet_to_json(ws, {
      defval:"",
      raw:false
    });

    if(!data.length) continue;

    const headers = Object.keys(data[0]);

    const colCiudad = findCol(headers, [
      "Ciudad",
      "City",
      "Origen Ciudad",
      "Columna 1"
    ]);

    const colNombre = findCol(headers, [
      "Nombres",
      "Nombre",
      "Cliente",
      "Cliente (s)",
      "Titular",
      "Titular Pago"
    ]);

    const colApellido = findCol(headers, [
      "Apellidos",
      "Apellido"
    ]);

    const colNumero = findCol(headers, [
      "Numero",
      "Número",
      "Telefono",
      "Teléfono",
      "Telefono Cliente",
      "Teléfono Cliente",
      "Familiar",
      "Phone"
    ]);

    const colTramite = findCol(headers, [
      "Tramites",
      "Trámites",
      "Tramite",
      "Trámite",
      "Servicio",
      "Tipo"
    ]);

    const colStatus = findCol(headers, [
      "Status",
      "Estatus",
      "Estado"
    ]);

    const colPropietario = findCol(headers, [
      "Propietario",
      "Vendedor",
      "Agente",
      "Owner"
    ]);

    const sheetCity = getSheetCity(sheetName);

    for(const item of data){
      let ciudad = clean(colCiudad ? item[colCiudad] : "") || sheetCity;

      let nombre = clean(colNombre ? item[colNombre] : "");
      let apellido = clean(colApellido ? item[colApellido] : "");

      let telefono = normalizePhone(colNumero ? item[colNumero] : "");

      if(!telefono){
        telefono = extractPhoneFromRow(item);
      }

      let tramite = clean(colTramite ? item[colTramite] : "");
      let status = normalizeStatus(colStatus ? item[colStatus] : "");
      let propietario = clean(colPropietario ? item[colPropietario] : "");

      if(!nombre && !apellido) continue;
      if(!telefono) continue;

      if(isHeaderFake(nombre, apellido, telefono, ciudad)) continue;

      rows.push({
        id: crypto.randomUUID(),
        ciudad: normalizeCity(ciudad),
        nombre,
        apellido,
        nombreCompleto: clean(nombre + " " + apellido),
        telefono,
        tramite: tramite || "Sin trámite",
        status: status || "Pendiente",
        propietario,
        fuente: file.name + " / " + sheetName
      });
    }
  }
}

function extractPhoneFromRow(row){
  for(const value of Object.values(row)){
    const phone = normalizePhone(value);
    if(phone) return phone;
  }
  return "";
}

function normalizeStatus(v){
  const s = clean(v).toLowerCase();

  if(s.includes("pagado") || s === "pago") return "Pagado";
  if(s.includes("agendar")) return "Agendar";
  if(s.includes("esp")) return "Esp. Disp.";
  if(s.includes("pend")) return "Pendiente";
  if(s.includes("anulado")) return "Anulado";
  if(s.includes("cancel")) return "Anulado";

  return clean(v) || "Pendiente";
}

function normalizeCity(v){
  let c = clean(v);

  if(!c) return "Sin ciudad";

  const lower = c.toLowerCase();

  if(lower.includes("atlanta")) return "Atlanta";
  if(lower.includes("austin")) return "Austin";
  if(lower.includes("fresno")) return "Fresno";
  if(lower.includes("san jose")) return "San Jose";
  if(lower.includes("san francisco")) return "San Francisco";
  if(lower.includes("san bernardino")) return "San Bernardino";
  if(lower.includes("los angeles")) return "Los Angeles";
  if(lower.includes("new york")) return "New York";
  if(lower.includes("chicago")) return "Chicago";
  if(lower.includes("oxnard")) return "Oxnard";
  if(lower.includes("seattle")) return "Seattle";
  if(lower.includes("sacramento")) return "Sacramento";
  if(lower.includes("del rio")) return "Del Rio";
  if(lower.includes("dallas")) return "Dallas";
  if(lower.includes("houston")) return "Houston";

  return c;
}

function isHeaderFake(nombre, apellido, telefono, ciudad){
  const text = clean(nombre + " " + apellido + " " + telefono + " " + ciudad).toLowerCase();

  if(text.includes("nombres")) return true;
  if(text.includes("apellidos")) return true;
  if(text.includes("numero")) return true;
  if(text.includes("telefono")) return true;
  if(text.includes("ciudad")) return true;
  if(text.includes("status")) return true;
  if(text.includes("propietario")) return true;

  return false;
}

function dedupe(){
  const map = new Map();

  for(const r of rows){
    const key = digits(r.telefono) + "|" + r.nombreCompleto.toLowerCase();

    if(!map.has(key)){
      map.set(key, r);
    }else{
      const old = map.get(key);

      map.set(key, {
        ...old,
        ciudad: old.ciudad || r.ciudad,
        tramite: old.tramite || r.tramite,
        status: pickBestStatus(old.status, r.status),
        propietario: old.propietario || r.propietario,
        fuente: old.fuente + " | " + r.fuente
      });
    }
  }

  rows = Array.from(map.values()).sort((a,b)=>{
    return rankStatus(b.status) - rankStatus(a.status);
  });
}

function pickBestStatus(a,b){
  return rankStatus(b) > rankStatus(a) ? b : a;
}

function rankStatus(s){
  if(s === "Pagado") return 100;
  if(s === "Esp. Disp.") return 70;
  if(s === "Pendiente") return 60;
  if(s === "Agendar") return 50;
  if(s === "Anulado") return 10;
  return 0;
}

function save(){
  localStorage.setItem("prospectos_ciudad_v1", JSON.stringify(rows));
}

function updateFilters(){
  const cityFilter = document.getElementById("cityFilter");
  const currentCity = cityFilter.value;

  const cities = [...new Set(rows.map(r => r.ciudad).filter(Boolean))].sort();

  cityFilter.innerHTML = "<option>Todos</option>" + cities.map(c => `<option>${c}</option>`).join("");

  if(cities.includes(currentCity)){
    cityFilter.value = currentCity;
  }
}

function render(){
  updateFilters();

  const q = document.getElementById("search").value.toLowerCase();
  const city = document.getElementById("cityFilter").value;
  const status = document.getElementById("statusFilter").value;

  const filtered = rows.filter(r => {
    if(city !== "Todos" && r.ciudad !== city) return false;
    if(status !== "Todos" && r.status !== status) return false;

    const all = `${r.nombreCompleto} ${r.telefono} ${r.ciudad} ${r.tramite} ${r.status}`.toLowerCase();
    return all.includes(q);
  });

  document.getElementById("total").innerText = rows.length;
  document.getElementById("pagados").innerText = rows.filter(r => r.status === "Pagado").length;
  document.getElementById("agendar").innerText = rows.filter(r => r.status === "Agendar").length;
  document.getElementById("phones").innerText = rows.filter(r => isValidPhone(r.telefono)).length;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach((r,i) => {
    const cls = r.status === "Pagado" ? "pagado" : r.status === "Agendar" ? "agendar" : "otro";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${escapeHTML(r.ciudad)}</td>
      <td>${escapeHTML(r.nombre)}</td>
      <td>${escapeHTML(r.apellido)}</td>
      <td>${escapeHTML(r.nombreCompleto)}</td>
      <td>${escapeHTML(r.telefono)}</td>
      <td>${escapeHTML(r.tramite)}</td>
      <td class="${cls}">${escapeHTML(r.status)}</td>
      <td>${escapeHTML(r.propietario)}</td>
      <td>${escapeHTML(r.fuente)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function exportExcel(){
  const data = rows.map((r,i) => ({
    "#": i+1,
    Ciudad: r.ciudad,
    Nombre: r.nombre,
    Apellido: r.apellido,
    "Nombre Completo": r.nombreCompleto,
    Telefono: r.telefono,
    Tramite: r.tramite,
    Status: r.status,
    Propietario: r.propietario,
    Fuente: r.fuente
  }));

  const wb = XLSX.utils.book_new();

  const ws = XLSX.utils.json_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, "Prospectos");

  const resumen = {};

  rows.forEach(r => {
    if(!resumen[r.ciudad]){
      resumen[r.ciudad] = {
        Ciudad: r.ciudad,
        Total: 0,
        Pagado: 0,
        Agendar: 0,
        Pendiente: 0,
        Anulado: 0
      };
    }

    resumen[r.ciudad].Total++;

    if(r.status === "Pagado") resumen[r.ciudad].Pagado++;
    if(r.status === "Agendar") resumen[r.ciudad].Agendar++;
    if(r.status === "Pendiente") resumen[r.ciudad].Pendiente++;
    if(r.status === "Anulado") resumen[r.ciudad].Anulado++;
  });

  const ws2 = XLSX.utils.json_to_sheet(Object.values(resumen));
  XLSX.utils.book_append_sheet(wb, ws2, "Resumen por Ciudad");

  XLSX.writeFile(wb, "prospectos_por_ciudad.xlsx");
}

function clearAll(){
  if(confirm("¿Seguro que quieres borrar todo?")){
    rows = [];
    localStorage.removeItem("prospectos_ciudad_v1");
    render();
  }
}

function escapeHTML(v){
  return String(v || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

render();
</script>

</body>
</html>
