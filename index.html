<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Organizador de Clientes</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f1117;
  color:white;
  padding:20px;
}
input,select,button{
  padding:6px;
  margin:4px;
}
table{
  width:100%;
  border-collapse: collapse;
  margin-top:20px;
}
th,td{
  border:1px solid #333;
  padding:6px;
}
</style>
</head>

<body>

<h2>Organizador de Clientes</h2>

<input type="file" id="fileInput">
<br>

<input id="search" placeholder="Buscar...">
<button onclick="exportExcel()">Exportar Excel</button>

<br>

<select id="filterInteres" onchange="render()">
  <option>Todos</option>
  <option>Sin clasificar</option>
  <option>Salud</option>
  <option>Vida</option>
  <option>Auto</option>
  <option>No interesado</option>
</select>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Ciudad</th>
<th>Teléfono</th>
<th>Status</th>
<th>Interés</th>
<th>Nota</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

let rows = JSON.parse(localStorage.getItem("clientes") || "[]");

document.getElementById("fileInput").addEventListener("change", e=>{
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = (evt)=>{
    const wb = XLSX.read(evt.target.result, {type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws);

    const parsed = data.map((r,i)=>({
      id: Date.now()+i,
      nombre: r.Nombre || r.name || "",
      ciudad: r.Ciudad || r.city || "",
      telefono: r.Telefono || r.Phone || "",
      status: r.Status || "",
      interes: "Sin clasificar",
      nota: ""
    }));

    rows = [...rows, ...parsed];
    save();
    render();
  };

  reader.readAsArrayBuffer(file);
});

function save(){
  localStorage.setItem("clientes", JSON.stringify(rows));
}

function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const filtro = document.getElementById("filterInteres").value;

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  rows
  .filter(r=>{
    if(filtro !== "Todos" && r.interes !== filtro) return false;
    return r.nombre.toLowerCase().includes(search) || r.telefono.includes(search);
  })
  .forEach(r=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.nombre}</td>
      <td>${r.ciudad}</td>
      <td>${r.telefono}</td>
      <td>${r.status}</td>
      <td>
        <select onchange="updateInteres('${r.id}',this.value)">
          <option ${r.interes=="Sin clasificar"?"selected":""}>Sin clasificar</option>
          <option ${r.interes=="Salud"?"selected":""}>Salud</option>
          <option ${r.interes=="Vida"?"selected":""}>Vida</option>
          <option ${r.interes=="Auto"?"selected":""}>Auto</option>
          <option ${r.interes=="No interesado"?"selected":""}>No interesado</option>
        </select>
      </td>
      <td>
        <input value="${r.nota}" onchange="updateNota('${r.id}',this.value)">
      </td>
    `;

    tbody.appendChild(tr);

  });
}

function updateNota(id,val){
  rows = rows.map(r => r.id==id ? {...r, nota:val} : r);
  save();
}

function updateInteres(id,val){
  rows = rows.map(r => r.id==id ? {...r, interes:val} : r);
  save();
  render();
}

function exportExcel(){
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Clientes");
  XLSX.writeFile(wb, "clientes.xlsx");
}

render();

</script>

</body>
</html>
